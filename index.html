<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>桌游规则遗忘点卡片库</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">聚会前快速复习</p>
          <h1>桌游规则遗忘点卡片库</h1>
        </div>
        <div class="summary">
          <div>
            <span>收藏</span>
            <strong id="gameCount">0</strong>
          </div>
          <div>
            <span>遗忘点</span>
            <strong id="ruleCount">0</strong>
          </div>
          <div>
            <span>最久未玩</span>
            <strong id="staleGame">-</strong>
          </div>
          <div class="review-pending">
            <span>仍需复习</span>
            <strong id="reviewPendingCount">0</strong>
          </div>
        </div>
      </header>

      <section class="controls">
        <label>
          搜索
          <input id="searchInput" type="search" placeholder="游戏名或规则关键词" />
        </label>
        <label>
          人数
          <select id="playerFilter">
            <option value="all">全部</option>
            <option value="2">适合2人</option>
            <option value="3">适合3人</option>
            <option value="4">适合4人</option>
            <option value="5">适合5人</option>
          </select>
        </label>
        <label>
          复杂度
          <select id="complexityFilter">
            <option value="all">全部</option>
            <option value="轻">轻</option>
            <option value="中">中</option>
            <option value="重">重</option>
          </select>
        </label>
        <label>
          排序
          <select id="sortMode">
            <option value="stale">最近未玩</option>
            <option value="name">名称</option>
            <option value="complexity">复杂度</option>
          </select>
        </label>
        <label class="checkbox-label">
          <input id="filterMustReview" type="checkbox" />
          <span>只看下次必看</span>
        </label>
      </section>

      <section class="backup-panel">
        <h2>数据备份与恢复</h2>
        <div class="backup-actions">
          <button id="exportBtn" type="button">导出 JSON</button>
          <button id="importBtn" type="button">导入 JSON</button>
          <input id="importFile" type="file" accept=".json,application/json" hidden />
          <button id="resetBtn" type="button" class="danger">恢复默认示例数据</button>
        </div>
        <div id="backupMessage" class="backup-message hidden"></div>
      </section>

      <section class="checklist-panel panel">
        <div class="panel-head">
          <h2>🎉 聚会前复习清单</h2>
          <span id="checklistSelectedCount">已选 0 个</span>
        </div>
        <div class="checklist-controls">
          <label class="checklist-filter">
            按人数筛选
            <select id="checklistPlayerFilter">
              <option value="all">全部人数</option>
              <option value="2">2人</option>
              <option value="3">3人</option>
              <option value="4">4人</option>
              <option value="5">5人</option>
              <option value="6">6人+</option>
            </select>
          </label>
          <div class="checklist-actions">
            <button id="clearChecklistBtn" type="button">清空选择</button>
            <button id="generateChecklistBtn" type="button" class="primary">生成复习清单</button>
          </div>
        </div>
        <div id="checklistGameList" class="checklist-game-list"></div>
        <div id="checklistView" class="checklist-view hidden"></div>
      </section>

      <div id="confirmDialog" class="dialog-overlay hidden">
        <div class="dialog">
          <h3 id="confirmTitle">确认操作</h3>
          <p id="confirmMessage">确定要执行此操作吗？</p>
          <div class="dialog-actions">
            <button id="confirmCancel" type="button">取消</button>
            <button id="confirmOk" type="button" class="primary">确定</button>
          </div>
        </div>
      </div>

      <div id="loanDialog" class="dialog-overlay hidden">
        <div class="dialog loan-dialog">
          <h3 id="loanDialogTitle">借出桌游</h3>
          <form id="loanForm" class="loan-form">
            <label>
              借给谁
              <input id="loanBorrowerInput" type="text" placeholder="请输入借阅人姓名" required />
            </label>
            <div class="split">
              <label>
                借出日期
                <input id="loanBorrowedAtInput" type="date" required />
              </label>
              <label>
                预计归还日期
                <input id="loanExpectedReturnInput" type="date" />
              </label>
            </div>
            <label>
              备注
              <textarea id="loanNotesInput" rows="3" placeholder="可选，记录一些特殊情况"></textarea>
            </label>
            <div class="dialog-actions">
              <button id="loanCancelBtn" type="button">取消</button>
              <button id="loanSubmitBtn" type="submit" class="primary">确认借出</button>
            </div>
          </form>
        </div>
      </div>

      <div id="loanHistoryDialog" class="dialog-overlay hidden">
        <div class="dialog loan-history-dialog">
          <h3 id="loanHistoryTitle">借出记录</h3>
          <div id="loanHistoryContent" class="loan-history-content"></div>
          <div class="dialog-actions">
            <button id="loanHistoryCloseBtn" type="button" class="primary">关闭</button>
          </div>
        </div>
      </div>

      <div id="editDialog" class="dialog-overlay hidden">
        <div class="dialog edit-dialog">
          <h3 id="editDialogTitle">编辑桌游</h3>
          <form id="editForm" class="edit-form">
            <label>
              名称
              <input id="editNameInput" type="text" required placeholder="例：勃艮第城堡" />
            </label>
            <div class="split">
              <label>
                最少人数
                <input id="editMinPlayersInput" type="number" min="1" max="12" required />
              </label>
              <label>
                最多人数
                <input id="editMaxPlayersInput" type="number" min="1" max="12" required />
              </label>
            </div>
            <div class="split">
              <label>
                时长分钟
                <input id="editDurationInput" type="number" min="5" required />
              </label>
              <label>
                复杂度
                <select id="editComplexityInput">
                  <option value="轻">轻</option>
                  <option value="中">中</option>
                  <option value="重">重</option>
                </select>
              </label>
            </div>
            <label>
              上次游玩
              <input id="editLastPlayedInput" type="date" required />
            </label>
            <label>
              封面图
              <input id="editCoverInput" type="file" accept="image/*" />
            </label>
            <div id="editCoverPreview" class="edit-cover-preview hidden">
              <img id="editCoverPreviewImg" alt="封面预览" />
            </div>

            <div class="edit-rules-section">
              <h4>容易忘的规则</h4>
              <div id="editForgesContainer" class="edit-rules-container"></div>
              <button type="button" class="add-rule-btn" data-rule-key="forgets">+ 添加一条</button>
            </div>

            <div class="edit-rules-section">
              <h4>常见争议</h4>
              <div id="editDisputesContainer" class="edit-rules-container"></div>
              <button type="button" class="add-rule-btn" data-rule-key="disputes">+ 添加一条</button>
            </div>

            <div class="edit-rules-section">
              <h4>开局准备</h4>
              <div id="editSetupContainer" class="edit-rules-container"></div>
              <button type="button" class="add-rule-btn" data-rule-key="setup">+ 添加一条</button>
            </div>

            <div class="edit-rules-section">
              <h4>计分提醒</h4>
              <div id="editScoringContainer" class="edit-rules-container"></div>
              <button type="button" class="add-rule-btn" data-rule-key="scoring">+ 添加一条</button>
            </div>

            <div id="editErrorMessage" class="edit-error-message hidden"></div>
            <div class="dialog-actions">
              <button id="editCancelBtn" type="button">取消</button>
              <button id="editSubmitBtn" type="submit" class="primary">保存</button>
            </div>
          </form>
        </div>
      </div>

      <section class="layout">
        <aside class="panel">
          <h2>新增桌游</h2>
          <form id="gameForm" class="game-form">
            <label>
              名称
              <input id="nameInput" required placeholder="例：勃艮第城堡" />
            </label>
            <div class="split">
              <label>
                最少人数
                <input id="minPlayersInput" type="number" min="1" max="12" value="2" required />
              </label>
              <label>
                最多人数
                <input id="maxPlayersInput" type="number" min="1" max="12" value="4" required />
              </label>
            </div>
            <div class="split">
              <label>
                时长分钟
                <input id="durationInput" type="number" min="5" value="90" required />
              </label>
              <label>
                复杂度
                <select id="complexityInput">
                  <option value="轻">轻</option>
                  <option value="中" selected>中</option>
                  <option value="重">重</option>
                </select>
              </label>
            </div>
            <label>
              上次游玩
              <input id="lastPlayedInput" type="date" required />
            </label>
            <label>
              封面图
              <input id="coverInput" type="file" accept="image/*" />
            </label>
            <button class="primary" type="submit">加入收藏</button>
          </form>
        </aside>

        <section class="panel list-panel">
          <div class="panel-head">
            <h2>收藏列表</h2>
            <span id="visibleCount"></span>
          </div>
          <div id="gameList" class="game-list"></div>
        </section>

        <aside class="panel detail-panel">
          <div id="detailView"></div>
        </aside>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
